<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyadh Industrial Week Expo Tracker</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a2128;
    --border: #2a333d;
    --text: #e6e9ec;
    --muted: #8a97a3;
    --accent: #4f9dff;
    --green: #3ddc84;
    --yellow: #ffc857;
    --red: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 1rem;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 0.25rem;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
  .controls {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 0.5rem 0;
    z-index: 10;
  }
  #search {
    flex: 1;
    min-width: 180px;
    padding: 0.7rem 0.8rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 16px;
  }
  select#filterGroup, select#filterInterest {
    padding: 0.7rem 0.5rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 16px;
  }
  .stats {
    display: flex;
    gap: 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .group-header {
    margin: 1.2rem 0 0.5rem;
    font-size: 1rem;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.3rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
    transition: opacity 0.2s;
  }
  .card.done {
    opacity: 0.5;
  }
  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
  }
  .card-top input[type="checkbox"] {
    width: 24px;
    height: 24px;
    margin-top: 0.1rem;
    flex-shrink: 0;
  }
  .card-name {
    font-weight: 600;
    font-size: 0.95rem;
    flex: 1;
  }
  .card.done .card-name {
    text-decoration: line-through;
  }
  .card-priority {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }
  .card-body {
    margin-top: 0.5rem;
    margin-left: 30px;
  }
  select.interest {
    padding: 0.6rem 0.5rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #11161b;
    color: var(--text);
    font-size: 16px;
    margin-bottom: 0.4rem;
    width: 100%;
  }
  select.interest[data-val="very"] { border-color: var(--green); color: var(--green); }
  select.interest[data-val="interested"] { border-color: var(--yellow); color: var(--yellow); }
  select.interest[data-val="not"] { border-color: var(--red); color: var(--red); }
  textarea.notes {
    width: 100%;
    min-height: 60px;
    padding: 0.6rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #11161b;
    color: var(--text);
    font-size: 16px;
    resize: vertical;
    font-family: inherit;
  }
  .empty {
    color: var(--muted);
    text-align: center;
    padding: 2rem 0;
  }
  #resetBtn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--red);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .data-actions {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .data-actions button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--accent);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Riyadh Industrial Week Expo</h1>
<div class="subtitle">Company tracker &mdash; tick off, rate interest, add notes</div>

<div class="data-actions">
  <button id="exportBtn">Export JSON</button>
  <button id="importBtn">Import JSON</button>
  <input type="file" id="importFile" accept="application/json" style="display:none">
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search company...">
  <select id="filterGroup">
    <option value="">All groups</option>
  </select>
  <select id="filterInterest">
    <option value="">All interest</option>
    <option value="very">Very interested</option>
    <option value="interested">Interested</option>
    <option value="not">Not interested</option>
    <option value="">Unrated</option>
  </select>
</div>

<div class="stats" id="stats"></div>

<div id="list"></div>

<button id="resetBtn">Reset all data</button>

<script>

  ["Priority 1", "3P Gulf Group (Gulf Packaging System Co.)", "Abdullah seems like a very good guy, said to reach out to him after the event. They use SAP S4HANA. He built a performance monitoring dashboard for production line using Claude, Vercel, and Supabase", true],
  ["Priority 2", "Qassim Factory for Corrugated Carton and Paper Products Company", "Ibrahim the technical sales guy is really good, he sounded very tired but he told me to send him this and our portfolio on email and follow up after the event", true],
  ["Priority 2", "Al Medan Project Company for Corrugated Cartons", "The guys didn't seem interested, but got the contact of the sales manager, so will send him email", true],
  ["Priority 2", "Highgate Plastic Company LLC", "Dude hates AI and was super pissed", true],
  ["Priority 2", "Wesam Advanced Plastic Company", "Got the contact of commercial guy. Said he will connect to ERP manager", true],
  ["Priority 2", "Al Tayar Plastic & Rubber Manufacturing Company", "Asked me to send him info so he will forward to his sales manager", true],
  ["Priority 2", "Higher Institute for Plastics Fabrication", "Met the outreach director named Ahmed, he loves the idea and told me to send the email but include a message on how HIPF can use it in internal operations", true],
  ["Priority 2", "Pure Polymers Factory", "Met the CEO, gave me his contact. Said he would do a quick meeting and involve the marketing department to see how it goes. They use Odoo ERP", true],
  ["Priority 3", "Gulf Integrated Industries Co.", "They do all dev in-house through a sister company", true],
  ["Priority 3", "Raweht_alasbegah Factory Co.", "They don't have IT, still rely on Excel and stuff. Ops manager said they're not ready, mainly for dispatching. Maybe show them what they could automate, but keep this priority 3", true],

const STORAGE_KEY = "riyadhExpoTracker";

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch (e) {
    return {};
  }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function keyFor(name) { return name; }

function getEntry(name) {
  if (!state[name]) {
    state[name] = { done: false, interest: "", notes: "" };
  }
  return state[name];
}

const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");
const filterGroupEl = document.getElementById("filterGroup");
const filterInterestEl = document.getElementById("filterInterest");
const statsEl = document.getElementById("stats");

const groups = [...new Set(COMPANIES.map(c => c[0]))];
groups.forEach(g => {
  const opt = document.createElement("option");
  opt.value = g;
  opt.textContent = g;
  filterGroupEl.appendChild(opt);
});

function render() {
  const query = searchEl.value.trim().toLowerCase();
  const groupFilter = filterGroupEl.value;
  const interestFilter = filterInterestEl.value;

  listEl.innerHTML = "";
  let lastGroup = null;
  let visibleCount = 0;
  let doneCount = 0;

  COMPANIES.forEach(([group, name, defaultNote, defaultDone]) => {
    const entry = getEntry(name);
    if (!entry.doneInit) {
      if (defaultDone) entry.done = true;
      entry.doneInit = true;
    }
    if (entry.done) doneCount++;

    if (query && !name.toLowerCase().includes(query)) return;
    if (groupFilter && group !== groupFilter) return;
    if (filterInterestEl.value !== "" && entry.interest !== interestFilter) return;
    if (interestFilter === "" && filterInterestEl.selectedIndex > 0 && entry.interest !== "") {
      // handled by exact match above; no-op
    }

    visibleCount++;

    if (group !== lastGroup) {
      const h = document.createElement("div");
      h.className = "group-header";
      h.textContent = group;
      listEl.appendChild(h);
      lastGroup = group;
    }

    const card = document.createElement("div");
    card.className = "card" + (entry.done ? " done" : "");

    const top = document.createElement("div");
    top.className = "card-top";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = entry.done;
    checkbox.addEventListener("change", () => {
      entry.done = checkbox.checked;
      saveState(state);
      render();
    });

    const nameWrap = document.createElement("div");
    nameWrap.style.flex = "1";
    const nameEl = document.createElement("div");
    nameEl.className = "card-name";
    nameEl.textContent = name;
    const prioEl = document.createElement("div");
    prioEl.className = "card-priority";
    prioEl.textContent = group;
    nameWrap.appendChild(nameEl);
    nameWrap.appendChild(prioEl);

    top.appendChild(checkbox);
    top.appendChild(nameWrap);
    card.appendChild(top);

    const body = document.createElement("div");
    body.className = "card-body";

    const interestSelect = document.createElement("select");
    interestSelect.className = "interest";
    interestSelect.dataset.val = entry.interest;
    [["", "Unrated"], ["very", "Very interested"], ["interested", "Interested"], ["not", "Not interested"]].forEach(([val, label]) => {
      const opt = document.createElement("option");
      opt.value = val;
      opt.textContent = label;
      if (val === entry.interest) opt.selected = true;
      interestSelect.appendChild(opt);
    });
    interestSelect.addEventListener("change", () => {
      entry.interest = interestSelect.value;
      interestSelect.dataset.val = entry.interest;
      saveState(state);
      renderStats();
    });

    const notesArea = document.createElement("textarea");
    notesArea.className = "notes";
    notesArea.placeholder = "Add notes...";
    notesArea.value = entry.notes || defaultNote || "";
    if (!entry.notesInit) {
      entry.notes = notesArea.value;
      entry.notesInit = true;
    }
    notesArea.addEventListener("input", () => {
      entry.notes = notesArea.value;
      saveState(state);
    });

    body.appendChild(interestSelect);
    body.appendChild(notesArea);
    card.appendChild(body);

    listEl.appendChild(card);
  });

  if (visibleCount === 0) {
    listEl.innerHTML = '<div class="empty">No companies match your filters.</div>';
  }

  saveState(state);
  renderStats();
}

function renderStats() {
  const total = COMPANIES.length;
  let done = 0, very = 0, interested = 0, not = 0;
  COMPANIES.forEach(([, name]) => {
    const e = getEntry(name);
    if (e.done) done++;
    if (e.interest === "very") very++;
    if (e.interest === "interested") interested++;
    if (e.interest === "not") not++;
  });
  statsEl.innerHTML = `
    <span>${done}/${total} done</span>
    <span style="color:var(--green)">${very} very interested</span>
    <span style="color:var(--yellow)">${interested} interested</span>
    <span style="color:var(--red)">${not} not interested</span>
  `;
}

searchEl.addEventListener("input", render);
filterGroupEl.addEventListener("change", render);
filterInterestEl.addEventListener("change", render);

document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `riyadh-expo-tracker-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

const importFileEl = document.getElementById("importFile");
document.getElementById("importBtn").addEventListener("click", () => {
  importFileEl.click();
});
importFileEl.addEventListener("change", () => {
  const file = importFileEl.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!confirm("Import this data? It will overwrite your current checkmarks, notes, and ratings.")) return;
      state = imported;
      saveState(state);
      render();
    } catch (e) {
      alert("Invalid JSON file.");
    }
  };
  reader.readAsText(file);
  importFileEl.value = "";
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Reset all checkmarks, notes, and ratings? This cannot be undone.")) {
    state = {};
    saveState(state);
    render();
  }
});

render();
</script>

</body>
</html>
